name: PR Validation

on:
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore AppAutomation.sln

      - name: Build
        run: dotnet build AppAutomation.sln -c Release --no-restore

      - name: Test
        run: dotnet test --solution AppAutomation.sln -c Release --no-build
