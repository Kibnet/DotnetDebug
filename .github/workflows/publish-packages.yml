name: publish-packages

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish packages after validation
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      nuget_source:
        description: NuGet feed URL
        required: false
        default: https://api.nuget.org/v3/index.json
        type: string
  push:
    tags:
      - "appautomation-v*"

jobs:
  pack-and-publish:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          [xml]$versions = Get-Content -Raw eng/Versions.props
          $value = "$($versions.Project.PropertyGroup.EasyUseVersion)$($versions.Project.PropertyGroup.EasyUsePrereleaseSuffix)"
          "full=$value" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore DotnetDebug.sln

      - name: Build
        run: dotnet build DotnetDebug.sln -c Release --no-restore

      - name: Test
        run: dotnet test --solution DotnetDebug.sln -c Release --no-build

      - name: Pack
        shell: pwsh
        run: pwsh -File eng/pack.ps1 -Configuration Release

      - name: Smoke consumer
        shell: pwsh
        run: pwsh -File eng/smoke-consumer.ps1 -Configuration Release -SkipPack

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: appautomation-packages-${{ steps.version.outputs.full }}
          path: artifacts/packages/${{ steps.version.outputs.full }}
          if-no-files-found: error

      - name: Publish packages
        if: startsWith(github.ref, 'refs/tags/appautomation-v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
        shell: pwsh
        env:
          NUGET_SOURCE: ${{ github.event.inputs.nuget_source || 'https://api.nuget.org/v3/index.json' }}
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
          NUGET_SYMBOL_SOURCE: https://api.nuget.org/v3/index.json
          NUGET_SYMBOL_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: pwsh -File eng/publish-nuget.ps1
