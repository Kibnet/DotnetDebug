name: publish-packages

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: Package version
        required: true
        type: string
      publish:
        description: Publish packages after validation
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      nuget_source:
        description: NuGet feed URL
        required: false
        default: https://api.nuget.org/v3/index.json
        type: string

jobs:
  pack-and-publish:
    runs-on: windows-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Resolve version
        id: version
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          $arguments = @{}
          if (-not [string]::IsNullOrWhiteSpace($env:RELEASE_TAG)) {
            $arguments.Tag = $env:RELEASE_TAG
          }
          elseif (-not [string]::IsNullOrWhiteSpace($env:INPUT_VERSION)) {
            $arguments.Version = $env:INPUT_VERSION
          }
          else {
            throw "Version input is required for workflow_dispatch."
          }

          $value = & pwsh -NoLogo -NoProfile -File eng/resolve-package-version.ps1 @arguments
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to resolve package version."
          }

          "full=$value" >> $env:GITHUB_OUTPUT
          "packages_path=artifacts/packages/$value" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore AppAutomation.sln

      - name: Build
        run: dotnet build AppAutomation.sln -c Release --no-restore /p:AppAutomationVersion=${{ steps.version.outputs.full }}

      - name: Test
        run: dotnet test --solution AppAutomation.sln -c Release --no-build

      - name: Pack
        shell: pwsh
        run: pwsh -File eng/pack.ps1 -Configuration Release -Version '${{ steps.version.outputs.full }}'

      - name: Smoke consumer
        shell: pwsh
        run: pwsh -File eng/smoke-consumer.ps1 -Configuration Release -Version '${{ steps.version.outputs.full }}' -SkipPack

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: appautomation-packages-${{ steps.version.outputs.full }}
          path: ${{ steps.version.outputs.packages_path }}
          if-no-files-found: error

      - name: Publish packages
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
        shell: pwsh
        env:
          NUGET_SOURCE: ${{ github.event.inputs.nuget_source || 'https://api.nuget.org/v3/index.json' }}
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
          NUGET_SYMBOL_SOURCE: https://api.nuget.org/v3/index.json
          NUGET_SYMBOL_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: pwsh -File eng/publish-nuget.ps1 -Version '${{ steps.version.outputs.full }}'

      - name: Publish packages to GitHub Packages
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
        shell: pwsh
        env:
          NUGET_SOURCE: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
          NUGET_API_KEY: ${{ secrets.GITHUB_TOKEN }}
          NUGET_SYMBOL_SOURCE: ''
        run: pwsh -File eng/publish-nuget.ps1 -Version '${{ steps.version.outputs.full }}'

      - name: Attach NuGet packages to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.version.outputs.packages_path }}/*.nupkg
            ${{ steps.version.outputs.packages_path }}/*.snupkg
